# koo_deep_report 전체 설정 예제
# 사용법: koo_deep_report --config config_full.yaml
#         koo_deep_report --config config_full.yaml --no-render   # 렌더 끄기
#         koo_deep_report --config config_full.yaml --ua-threads 8 # 스레드 오버라이드
version: "2.0"

input:
  d3plot: "/data/warpage_study/case_lam_sym/d3plot"

output:
  directory: "/data/warpage_study/case_lam_sym/report"
  json: true
  csv: true

performance:
  threads: 4              # unified_analyzer 분석 스레드 (0 = 자동)
  render_threads: 2        # LSPrePost 렌더링 병렬 인스턴스 수
  verbose: true
  cache_geometry: true
  # lsprepost_path: "/opt/lsprepost/lsprepost"  # 수동 지정 시

# ── Design Criteria ──────────────────────────────────────
# keyword 파일의 *MAT_ 카드에서 항복응력(SIGY)/파단변형률(FAIL)을
# 자동 추출합니다. 아래 값은 keyword 데이터가 없는 파트에 적용됩니다.
#
# 우선순위: per-part > per-material > keyword 자동추출 > global fallback
design_criteria:
  global_stress_limit: 250.0    # MPa (0 = keyword 자동 추출만 사용)
  global_strain_limit: 0.002    # 기본 0.2% (keyword에 FAIL 없을 때)
  material_overrides:            # 재료별 오버라이드 (같은 재료 쓰는 파트 일괄 적용)
    ELASTIC:
      strain_limit: 0.001       # 탄성 재료: 0.1% 변형률 한계
    MOONEY_RIVLIN_RUBBER:
      strain_limit: 0.50        # 고무 재료: 50% 변형률 한계
    2:
      stress_limit: 150.0       # MID=2: 알루미늄 150 MPa
  overrides:                    # 파트별 수동 오버라이드 (최고 우선순위)
    1:
      stress_limit: 350.0       # Part 1: 고장력강 350 MPa
      strain_limit: 0.05        # Part 1: 5% 파단변형률
    3:
      stress_limit: 150.0       # Part 3: 알루미늄 150 MPa
    5:
      strain_limit: 0.10        # Part 5: 고무 10% 변형률 한계

analysis_jobs:
  - name: "Von Mises Stress"
    type: von_mises
    parts: [1, 2, 3]            # 특정 파트만 분석 (생략 시 전체)
    output_prefix: "stress"

  - name: "Effective Plastic Strain"
    type: eff_plastic_strain
    output_prefix: "strain"

  - name: "Part Motion"
    type: part_motion
    output_prefix: "motion"

  - name: "Element Quality"
    type: element_quality
    output_prefix: "quality"

  - name: "Surface Stress"
    type: surface_stress
    part_pattern: "PKG*"        # 이름 패턴으로 필터
    output_prefix: "surface_stress"
    surface:
      direction: [0, 0, -1]
      angle: 45.0

# ── Section View Rendering ──────────────────────────────
# 단면뷰(섹션뷰) 렌더링 설정. CLI(--section-view*) 보다 우선순위 낮음.
# 백엔드:
#   lsprepost (기본): LSPrePost drawcut+projectview, 고품질, X/Y/Z 모두 지원
#   software        : 내장 SW 래스터라이저 (VTK/GPU 불필요)
#
# 타겟 지정 방법 (셋 중 하나):
#   1) 미지정 → 전체 모델 단면뷰만
#   2) target_part_ids/target_patterns → 해당 파트만 fringe 강조한 단면뷰 1개
#   3) per_part: true → 분석 결과의 모든 파트 각각에 대해 1개씩 단면뷰 생성
section_view:
  enabled: true
  backend: lsprepost            # lsprepost | software
  mode: section                 # section (2D) | section_3d (3D 반절단; software 전용)
  axes: [x, y, z]
  fields: [von_mises, strain]   # von_mises | eps | strain | displacement | pressure | max_shear

  # per-part: 모든 파트에 대해 개별 단면뷰 (각 field × part × axis 조합)
  per_part: false

  # target: 특정 파트만 (per_part=false 일 때 적용)
  target_part_ids: []           # 예: [4, 5, 6]
  target_patterns: []           # 예: ["*PKG*", "*CELL*"]

  fade: 0.0                     # 0=비타겟 단색, >0=거리별 반투명
  sv_threads: 2                 # 병렬 단면뷰 렌더러 수
