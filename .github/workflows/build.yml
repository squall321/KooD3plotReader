name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            triplet: x64-linux
            cmake_extra: ""
          - os: windows-2022
            triplet: x64-windows
            cmake_extra: "-A x64"

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}

    env:
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "c82f74667287d3dc386bce81e44964370c91a289"
          runVcpkgInstall: false

      - name: Install dependencies (vcpkg)
        run: >
          vcpkg install
          hdf5[cpp]:${{ matrix.triplet }}
          yaml-cpp:${{ matrix.triplet }}
          gtest:${{ matrix.triplet }}

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DKOOD3PLOT_BUILD_V4_RENDER=OFF \
            -DKOOD3PLOT_BUILD_CAPI=OFF \
            -DKOOD3PLOT_ENABLE_SIMD=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build ${{ matrix.cmake_extra }} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DKOOD3PLOT_BUILD_V4_RENDER=OFF `
            -DKOOD3PLOT_BUILD_CAPI=OFF `
            -DKOOD3PLOT_ENABLE_SIMD=OFF

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Run tests
        run: ctest --test-dir build --build-config Release --output-on-failure --timeout 120
