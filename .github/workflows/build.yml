name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x64
            cmake_extra: ""
            ext: ""
          - os: windows-2022
            platform: win-x64
            cmake_extra: "-A x64"
            ext: ".exe"

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libomp-dev python3-tk

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=install \
            -DKOOD3PLOT_BUILD_V4_RENDER=OFF \
            -DKOOD3PLOT_BUILD_CAPI=OFF \
            -DKOOD3PLOT_BUILD_HDF5=OFF \
            -DKOOD3PLOT_ENABLE_SIMD=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build ${{ matrix.cmake_extra }} `
            -DCMAKE_INSTALL_PREFIX=install `
            -DKOOD3PLOT_BUILD_V4_RENDER=OFF `
            -DKOOD3PLOT_BUILD_CAPI=OFF `
            -DKOOD3PLOT_BUILD_HDF5=OFF `
            -DKOOD3PLOT_ENABLE_SIMD=OFF

      - name: Build C++
        run: cmake --build build --config Release --parallel 4

      - name: Run tests
        run: ctest --test-dir build --build-config Release --output-on-failure --timeout 120

      - name: Build single_analyzer executable (PyInstaller)
        shell: bash
        run: |
          pip install pyinstaller
          cd python/single_analyzer
          pyinstaller single_analyzer.spec --noconfirm
          echo "PyInstaller output:"
          ls -lh dist/

      - name: Package distribution
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME:-dev}"
          DIST="KooD3plotReader-${TAG}-${{ matrix.platform }}"
          mkdir -p "${DIST}/bin"

          # C++ executables
          if [ "${{ runner.os }}" = "Windows" ]; then
            find build -path "*/Release/*.exe" -exec cp {} "${DIST}/bin/" \;
          else
            for f in build/examples/unified_analyzer \
                     build/examples/comprehensive_example \
                     build/examples/full_extraction_example; do
              [ -f "$f" ] && cp "$f" "${DIST}/bin/"
            done
          fi

          # PyInstaller-built single_analyzer executable
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp python/single_analyzer/dist/single_analyzer.exe "${DIST}/bin/"
          else
            cp python/single_analyzer/dist/single_analyzer "${DIST}/bin/"
          fi

          # Python source (fallback for users who prefer python -m)
          cp -r python/single_analyzer "${DIST}/python_single_analyzer"

          # Config / YAML examples
          cp -r config "${DIST}/config"

          # Scripts
          mkdir -p "${DIST}/scripts"
          cp scripts/analyze_and_report.sh "${DIST}/scripts/" 2>/dev/null || true
          cp scripts/copy_dependencies.bat "${DIST}/scripts/" 2>/dev/null || true
          cp scripts/copy_dependencies.sh  "${DIST}/scripts/" 2>/dev/null || true

          echo "Distribution contents:"
          find "${DIST}" -type f | head -50

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KooD3plotReader-${{ matrix.platform }}
          path: KooD3plotReader-*-${{ matrix.platform }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    name: Create Release
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create zip archives
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            (cd "$name" && zip -r "../../${name}.zip" .)
          done
          cd ..
          ls -lh *.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.zip"
