name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-22.04
    name: Linux (GCC)

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libyaml-cpp-dev libomp-dev

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DKOOD3PLOT_BUILD_V4_RENDER=OFF \
            -DKOOD3PLOT_BUILD_CAPI=OFF \
            -DKOOD3PLOT_BUILD_HDF5=OFF \
            -DKOOD3PLOT_ENABLE_SIMD=OFF

      - name: Build
        run: cmake --build build --parallel 4

      - name: Run tests
        run: ctest --test-dir build --output-on-failure --timeout 120

  windows:
    runs-on: windows-2022
    name: Windows (MSVC)

    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_INSTALLATION_ROOT }}\installed
          key: vcpkg-win-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: vcpkg-win-

      - name: Install dependencies (vcpkg)
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install yaml-cpp:x64-windows
        shell: pwsh

      - name: Configure
        run: |
          cmake -B build -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DKOOD3PLOT_BUILD_V4_RENDER=OFF `
            -DKOOD3PLOT_BUILD_CAPI=OFF `
            -DKOOD3PLOT_BUILD_HDF5=OFF `
            -DKOOD3PLOT_ENABLE_SIMD=OFF

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Run tests
        run: ctest --test-dir build --build-config Release --output-on-failure --timeout 120
